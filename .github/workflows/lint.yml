name: lint/formatter
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - master

permissions:
  contents: read

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install black
        run: pip install black==23.12.1
      - name: Run black
        run: black --check --verbose --config pyproject.toml .

  flake8:
    permissions:
      contents: read
      checks: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/checkout@v6
      - name: Install flake8
        run: pip install flake8==7.3.0
      - name: Run flake8
        uses: suo/flake8-github-action@3e87882219642e01aa8a6bbd03b4b0adb8542c2a # v1 release
        with:
          checkName: "flake8"
          args: "--config=.flake8 remotecv tests"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  isort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/checkout@v6
      - name: Install isort
        run: pip install isort==6.0.1
      - name: Run isort
        run: isort --check-only --settings-file=pyproject.toml remotecv tests

  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run pylint
        run: pylint --rcfile=.pylintrc remotecv tests
